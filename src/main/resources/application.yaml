spring:
  application:
    name: osugachabot

  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never

management:
  tracing:
    export:
      enabled: false
  otlp:
    metrics:
      export:
        enabled: false

discord:
  token: ${DISCORD_BOT_TOKEN}