databaseChangeLog:
  - changeSet:
      id: 0016-create-user-collection-value
      author: liquibase
      changes:
        - createTable:
            tableName: user_collection_value
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_collection_value
              - column:
                  name: total_value
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: card_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
