databaseChangeLog:
  - changeSet:
      id: 0009-create-active-status-effects
      author: liquibase
      changes:
        - createTable:
            tableName: active_status_effects
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: effect
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: active_status_effects
            indexName: idx_active_status_effects_user_effect
            unique: true
            columns:
              - column:
                  name: user_id
              - column:
                  name: effect
