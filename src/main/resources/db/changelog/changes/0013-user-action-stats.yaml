databaseChangeLog:
  - changeSet:
      id: 0013-create-user-action-stats
      author: liquibase
      changes:
        - createTable:
            tableName: user_action_stats
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: count
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_action_stats
            columnNames: user_id, action
            constraintName: pk_user_action_stats
