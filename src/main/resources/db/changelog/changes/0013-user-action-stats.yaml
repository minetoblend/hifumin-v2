databaseChangeLog:
  - changeSet:
      id: 0013-create-user-action-stats
      author: liquibase
      changes:
        - createTable:
            tableName: user_action_stats
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_action_stats
              - column:
                  name: action
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_action_stats
              - column:
                  name: count
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
