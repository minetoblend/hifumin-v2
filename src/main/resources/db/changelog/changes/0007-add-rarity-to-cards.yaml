databaseChangeLog:
  - changeSet:
      id: 0007-add-rarity-to-cards
      author: liquibase
      changes:
        - addColumn:
            tableName: cards
            columns:
              - column:
                  name: rarity
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  defaultValue: "Common"
        - sql:
            sql: >
              UPDATE cards SET rarity = CASE
                WHEN follower_count >= 500000 THEN 'Mythic'
                WHEN follower_count >= 100000 THEN 'Legendary'
                WHEN follower_count >= 10000  THEN 'Rare'
                WHEN follower_count >= 1000   THEN 'Uncommon'
                ELSE 'Common'
              END
