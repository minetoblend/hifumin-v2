databaseChangeLog:
  - changeSet:
      id: 0008-create-inventory-items
      author: liquibase
      changes:
        - createTable:
            tableName: inventory_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: item_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: BIGINT
                  constraints:
                    nullable: false
        - createIndex:
            tableName: inventory_items
            indexName: idx_inventory_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: inventory_items
            indexName: idx_inventory_user_item_type
            unique: true
            columns:
              - column:
                  name: user_id
              - column:
                  name: item_type
