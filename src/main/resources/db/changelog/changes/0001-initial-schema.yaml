databaseChangeLog:
  - changeSet:
      id: 0001-create-cards
      author: liquibase
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: country_code
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: follower_count
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: global_rank
                  type: INT
        - createIndex:
            tableName: cards
            indexName: idx_username
            columns:
              - column:
                  name: username
        - createIndex:
            tableName: cards
            indexName: idx_country_code
            columns:
              - column:
                  name: country_code
        - createIndex:
            tableName: cards
            indexName: idx_global_rank
            columns:
              - column:
                  name: global_rank

  - changeSet:
      id: 0001-create-card-replicas
      author: liquibase
      changes:
        - createTable:
            tableName: card_replicas
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_card_replicas_card
                    references: cards(id)
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: card_condition
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: card_replicas
            indexName: idx_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: card_replicas
            indexName: idx_condition
            columns:
              - column:
                  name: card_condition
        - createIndex:
            tableName: card_replicas
            indexName: idx_created_at
            columns:
              - column:
                  name: created_at
