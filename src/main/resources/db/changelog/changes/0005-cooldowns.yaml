databaseChangeLog:
  - changeSet:
      id: 0005-create-cooldowns-table
      author: liquibase
      changes:
        - createTable:
            tableName: cooldowns
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_used_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: cooldowns
            columnNames: user_id, type
            constraintName: uq_cooldowns_user_type
